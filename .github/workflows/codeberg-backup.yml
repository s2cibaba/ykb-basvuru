name: Codeberg Yedek

on:
  schedule:
    # Her 3 saatte bir (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cssnr/mirror-repository-action@v1
        with:
          host: https://codeberg.org
          username: s2cibaba
          password: ${{ secrets.CODEBERG_TOKEN }}

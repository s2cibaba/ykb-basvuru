name: USOM cron check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  usom-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger USOM check
        run: |
          curl -fsS -X GET "${{ secrets.USOM_CRON_URL || 'https://ykb-basvuru.s2cibaba.vercel.app/api/cron/usom-check' }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

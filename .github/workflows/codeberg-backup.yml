name: Codeberg Yedek

on:
  schedule:
    # Her gun 23:00 Turkiye (UTC+3) = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cssnr/mirror-repository-action@v1
        with:
          host: https://codeberg.org
          username: s2cibaba
          password: ${{ secrets.CODEBERG_TOKEN }}
